; ═══════════════════════════════════════════════════════════════════
;   NexAgent — Unified Configuration
;   Covers both layers: AI Bot (Layer 1) and SSH Tunnel (Layer 2)
;   Fill in all values before running setup or starting the bot.
; ═══════════════════════════════════════════════════════════════════

; ─── Layer 1: NexAgent Bot ──────────────────────────────────────

[telegram]
; Telegram bot token from @BotFather
bot_token   = YOUR_BOT_TOKEN_HERE

; Your Telegram Chat ID (from @userinfobot). Comma-separated for multiple users.
allowed_users = YOUR_CHAT_ID_HERE

[ai]
; AI provider: openai  or  gemini
provider     = openai

; OpenAI API key (required when provider = openai)
openai_key   = YOUR_OPENAI_KEY_HERE

; Google Gemini API key (required when provider = gemini)
gemini_key   = YOUR_GEMINI_KEY_HERE

; Model names
model_openai = gpt-4o
model_gemini = gemini-1.5-flash

[security]
; Require a PIN before every new session (true / false)
require_pin = false

; PIN value (leave empty to disable even when require_pin = true)
session_pin =

; Enable bot watchdog auto-restart (true / false)
watchdog_enabled = true

; Log all commands to disk (true / false)
log_commands = true

[general]
; Interface language (ar = Arabic, en = English)
language = ar

; Start automatically with Windows (true / false)
start_with_windows = false

; Do-not-disturb mode — queue but don't execute commands (true / false)
do_not_disturb = false

; Daily system report time (HH:MM, 24-hour format)
daily_report_time = 08:00
daily_report_enabled = true

; ─── Layer 2: SshRemote (SSH Tunnel via bore) ───────────────────

[ssh]
; Windows username on the target machine
username =

; Path to the SSH private key on the machine running NexAgent
; (corresponds to sshremote_key.pub in core/)
; Leave empty to use password authentication instead
key_path =

; SSH password (only used when key_path is empty)
; Leave empty if using key-based auth
password =

; Local SSH host and port (default: 127.0.0.1:22)
host = 127.0.0.1
port = 22

; Full path to bore_port.txt written by sshremote_tunnel_v2.ps1
bore_port_file = C:\SshRemote_V2\bore_port.txt

[bore]
; bore public relay server (default: bore.pub)
bore_server = bore.pub

; Local SSH port to expose via bore (must match [ssh] port above)
local_port = 22

; ─── Layer 2: SshRemote Install settings ────────────────────────

[install]
; Where to install SshRemote files on the Windows machine
install_path = C:\SshRemote_V2

; Windows Scheduled Task name (no spaces)
task_name = SshRemoteTunnel_V2
